<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartMaster v2.0</title>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-900 text-white font-sans flex flex-col items-center justify-center min-h-screen p-4">

    <!-- APP CONTAINER -->
    <div class="w-full max-w-md bg-slate-800 rounded-3xl p-6 shadow-2xl border border-slate-700 min-h-[550px] flex flex-col justify-between">
        
        <!-- ================= STARTSCHERM ================= -->
        <div id="screen-home" class="text-center my-auto">
            <h1 class="text-3xl font-black tracking-wider text-red-500 mb-2">🫀 HEARTMASTER</h1>
            <p class="text-slate-400 text-sm mb-6">Bloedsomloop App v2.0</p>

            <div class="space-y-3">
                <button onclick="switchScreen('screen-learn')" class="w-full py-4 bg-red-600 hover:bg-red-500 font-bold rounded-2xl transition transform hover:scale-102 shadow-md text-left px-6 flex items-center justify-between cursor-pointer">
                    <span>▶ 1. Leren</span> <span class="text-xs bg-red-800 px-2 py-1 rounded-md">Interactief</span>
                </button>
                <button class="w-full py-4 bg-slate-700 opacity-50 font-bold rounded-2xl text-left px-6 cursor-not-allowed" disabled>
                    🎮 2. Sleepspel (Binnenkort)
                </button>
                <button class="w-full py-4 bg-slate-700 opacity-50 font-bold rounded-2xl text-left px-6 cursor-not-allowed" disabled>
                    🧠 3. Toets (Binnenkort)
                </button>
            </div>
        </div>

        <!-- ================= LEERSTAND SCHERM ================= -->
        <div id="screen-learn" class="hidden flex flex-col justify-between h-full flex-grow">
            <div>
                <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-3">
                    <h2 class="text-xl font-bold text-red-400">📚 Interactieve Leerstand</h2>
                    <button onclick="switchScreen('screen-home')" class="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-lg cursor-pointer">🏠 Menu</button>
                </div>

                <div class="bg-slate-900 rounded-2xl p-6 text-center mb-6 border border-slate-700 min-h-[160px] flex flex-col justify-center items-center">
                    <div id="blood-indicator" class="w-16 h-16 rounded-full bg-red-600 flex items-center justify-center text-2xl font-bold shadow-lg transition-all duration-300">
                        🫀
                    </div>
                    <div id="station-name" class="text-xl font-black tracking-wide mt-4 text-red-500">Linkerkamer</div>
                    <div id="blood-type" class="text-xs font-semibold mt-1 px-2 py-0.5 rounded bg-red-900/50 text-red-400">🔴 Zuurstofrijk bloed</div>
                </div>

                <p id="station-text" class="text-slate-300 text-sm leading-relaxed text-center px-2 min-h-[60px]">
                    De linkerkamer heeft een dikke gespierde wand. Hij pompt het zuurstofrijke bloed met flinke kracht de aorta in.
                </p>
            </div>

            <div class="mt-6">
                <button onclick="nextStation()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 font-bold rounded-2xl transition transform active:scale-95 shadow-md flex items-center justify-center gap-2 cursor-pointer">
                    <span>Volgende stap</span> ➔
                </button>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="mt-6 pt-4 border-t border-slate-700 text-xs text-slate-500 flex justify-between">
            <span>Versie 2.0 (BETA)</span>
            <span class="text-green-400">● Cloudflare Ready</span>
        </div>
    </div>

    <!-- ================= LOGICA ================= -->
    <script>
        const route = [
            { name: "Linkerkamer", type: "rich", text: "De linkerkamer heeft een dikke gespierde wand. Hij pompt het zuurstofrijke bloed met flinke kracht de aorta in." },
            { name: "Aorta", type: "rich", text: "De aorta is de grootste slagader van het lichaam. Vanuit hier vertakt het bloed zich naar alle organen." },
            { name: "Slagaders", type: "rich", text: "Slagaders hebben dikke, elastische wanden. Ze transporteren het bloed áf van het hart richting de weefsels." },
            { name: "Haarvaten", type: "capillary", text: "In de flinterdunne haarvaten geeft het bloed zuurstof af aan de cellen en neemt het afvalstoffen (CO₂) op." },
            { name: "Aders", type: "poor", text: "Aders stromen terug náár het hart. Ze bevatten kleppen om te zorgen dat het bloed niet terugstroomt." },
            { name: "Holle ader", type: "poor", text: "De bovenste en onderste holle ader verzamelen al het zuurstofarme bloed en komen uit in de rechterboezem." },
            { name: "Rechterboezem", type: "poor", text: "De rechterboezem ontvangt het zuurstofarme bloed en stroomt direct door naar de rechterkamer." },
            { name: "Rechterkamer", type: "poor", text: "De rechterkamer pompt het zuurstofarme bloed richting de longslagader." },
            { name: "Longslagader", type: "poor", text: "Let op! Dit is de enige SLAGADER in het lichaam die ZUURSTOFARM bloed vervoert, op weg naar de longen." },
            { name: "Longen", type: "lung", text: "In de longblaasjes adem je CO₂ uit en neemt het bloed weer verse zuurstof (O₂) op. Het bloed wordt weer vuurrood!" },
            { name: "Longader", type: "rich", text: "De longader brengt het vers geoogste, zuurstofrijke bloed weer terug naar de linkerkant van het hart." },
            { name: "Linkerboezem", type: "rich", text: "De linkerboezem verzamelt het zuurstofrijke bloed en vult direct de linkerkamer voor de volgende ronde." }
        ];

        let currentStep = 0;

        function switchScreen(screenId) {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-learn').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
            if(screenId === 'screen-learn') {
                currentStep = 0;
                updateStation();
            }
        }

        function updateStation() {
            const station = route[currentStep];
            const indicator = document.getElementById('blood-indicator');
            const nameEl = document.getElementById('station-name');
            const typeEl = document.getElementById('blood-type');
            const textEl = document.getElementById('station-text');

            nameEl.innerText = station.name;
            textEl.innerText = station.text;

            if (station.type === "rich") {
                indicator.className = "w-16 h-16 rounded-full bg-red-600 flex items-center justify-center text-2xl font-bold shadow-lg transition-all duration-300";
                nameEl.className = "text-xl font-black tracking-wide mt-4 text-red-500";
                typeEl.innerText = "🔴 Zuurstofrijk bloed";
                typeEl.className = "text-xs font-semibold mt-1 px-2 py-0.5 rounded bg-red-900/50 text-red-400";
            } else if (station.type === "poor") {
                indicator.className = "w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center text-2xl font-bold shadow-lg transition-all duration-300";
                nameEl.className = "text-xl font-black tracking-wide mt-4 text-blue-500";
                typeEl.innerText = "🔵 Zuurstofarm bloed";
                typeEl.className = "text-xs font-semibold mt-1 px-2 py-0.5 rounded bg-blue-950/50 text-blue-400";
            } else if (station.type === "capillary") {
                indicator.className = "w-16 h-16 rounded-full bg-purple-600 flex items-center justify-center text-2xl font-bold shadow-lg transition-all duration-300";
                nameEl.className = "text-xl font-black tracking-wide mt-4 text-purple-400";
                typeEl.innerText = "🟣 Gaswisseling (Lichaam)";
                typeEl.className = "text-xs font-semibold mt-1 px-2 py-0.5 rounded bg-purple-900/50 text-purple-400";
            } else if (station.type === "lung") {
                indicator.className = "w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center text-2xl font-bold shadow-lg transition-all duration-300";
                nameEl.className = "text-xl font-black tracking-wide mt-4 text-emerald-400";
                typeEl.innerText = "💨 Zuurstof opname (Longen)";
                typeEl.className = "text-xs font-semibold mt-1 px-2 py-0.5 rounded bg-emerald-900/50 text-emerald-400";
            }
        }

        function nextStation() {
            currentStep = (currentStep + 1) % route.length;
            updateStation();
        }
    </script>
</body>
</html>
